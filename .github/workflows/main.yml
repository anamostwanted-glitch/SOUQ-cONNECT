name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Show dist/index.html content
        run: cat dist/index.html
      - name: List dist directory
        run: ls -la dist/ && ls -la dist/assets/ || echo "No assets folder"
      - name: Create .htaccess for SPA routing
        run: |
          printf 'Options -MultiViews\nRewriteEngine On\nRewriteBase /\nRewriteRule ^assets/ - [L]\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [QSA,L]' > dist/.htaccess
      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 82.198.229.62
          username: u860342626
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /public_html/
          dangerous-clean-slate: true
          disable-hash-comparison: true
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
