name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Create .htaccess for SPA routing
        run: |
          printf 'Options -MultiViews\nRewriteEngine On\nRewriteBase /\nRewriteRule ^assets/ - [L]\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [QSA,L]' > dist/.htaccess
      - name: Show dist/index.html content
        run: cat dist/index.html
      - name: List dist directory
        run: ls -la dist/ && ls -la dist/assets/
      - name: Deploy via curl FTP
        run: |
          sudo apt-get install -y lftp curl
          echo "Uploading index.html first..."
          curl -v --ftp-pasv -T dist/index.html "ftp://u860342626:$FTP_PASSWORD@82.198.229.62/public_html/index.html"
          echo "Uploading .htaccess..."
          curl -v --ftp-pasv -T dist/.htaccess "ftp://u860342626:$FTP_PASSWORD@82.198.229.62/public_html/.htaccess"
          echo "Uploading assets directory..."
          lftp -c "
            set ftp:ssl-allow no;
            open -u u860342626,$FTP_PASSWORD 82.198.229.62;
            mirror --reverse --delete --transfer-all ./dist/assets/ /public_html/assets/;
            quit
          "
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
