name: Build and Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build
      - name: Create .htaccess for SPA routing
        run: |
          printf 'Options -MultiViews\nRewriteEngine On\nRewriteBase /\nRewriteRule ^assets/ - [L]\nRewriteCond %%{REQUEST_FILENAME} !-f\nRewriteCond %%{REQUEST_FILENAME} !-d\nRewriteRule ^ index.html [QSA,L]' > dist/.htaccess
      - name: Show dist/index.html content
        run: cat dist/index.html
      - name: List dist directory
        run: ls -la dist/ && ls -la dist/assets/
      - name: Deploy via lftp with transfer-all
        run: |
          sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 10;
            set net:max-retries 5;
            open -u u860342626,$FTP_PASSWORD 82.198.229.62;
            mirror --reverse --delete --transfer-all --verbose ./dist/ /public_html/;
            quit
          "
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
